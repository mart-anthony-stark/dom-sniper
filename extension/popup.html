<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 400px;
      margin: 0;
      padding: 15px;
      background: #fdfdfd;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #d32f2f;
      border-bottom: 2px solid #d32f2f;
      padding-bottom: 5px;
    }
    .alert-card {
      border: 1px solid #ffcdd2;
      background: #fff5f5;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    .alert-card strong {
      display: block;
      color: #c62828;
      margin-bottom: 5px;
    }
    .detail {
      font-size: 12px;
      margin-bottom: 3px;
      word-wrap: break-word;
    }
    .detail-label {
      font-weight: bold;
      color: #555;
    }
    .code-block {
      background: #eee;
      padding: 4px;
      font-family: monospace;
      font-size: 11px;
      border-radius: 3px;
      display: block;
      margin-top: 2px;
    }
    #no-alerts {
      text-align: center;
      color: #388e3c;
      font-weight: bold;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h2>🚨 DOM XSS Traces</h2>
  <div id="alerts-container">
    <div id="no-alerts">No DOM XSS alerts found on this page!</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
