<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 400px;
      margin: 0;
      padding: 15px;
      background: #fdfdfd;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #d32f2f;
      border-bottom: 2px solid #d32f2f;
      padding-bottom: 5px;
    }
    .alert-card {
      border: 1px solid #ffcdd2;
      background: #fff5f5;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    .alert-card strong {
      display: block;
      color: #c62828;
      margin-bottom: 5px;
    }
    .detail {
      font-size: 12px;
      margin-bottom: 3px;
      word-wrap: break-word;
    }
    .detail-label {
      font-weight: bold;
      color: #555;
    }
    .code-block {
      background: #eee;
      padding: 4px;
      font-family: monospace;
      font-size: 11px;
      border-radius: 3px;
      display: block;
      margin-top: 2px;
    }
    #no-alerts {
      text-align: center;
      color: #388e3c;
      font-weight: bold;
      padding: 20px;
    }
    .settings-panel {
      background: #f1f1f1;
      padding: 12px;
      border-radius: 6px;
      margin-top: 15px;
      border: 1px solid #ddd;
    }
    .settings-panel h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #555;
    }
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
    }
    /* Simple toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #d32f2f; }
    input:checked + .slider:before { transform: translateX(14px); }
  </style>
</head>
<body>
  <h2>🚨 DOMSniper Traces</h2>
  <div id="alerts-container">
    <div id="no-alerts">No DOM XSS alerts found on this page!</div>
  </div>

  <div class="settings-panel" style="background: #e8f5e9; border-color: #a5d6a7; margin-bottom: 15px;">
    <div class="setting-item">
      <span style="font-weight: bold; color: #2e7d32;">✅ Scanning Enabled</span>
      <label class="switch">
        <input type="checkbox" id="scanning-enabled" checked>
        <span class="slider" style="background-color: #81c784;"></span>
      </label>
    </div>
  </div>

  <div class="settings-panel">
    <h3>Visual Configuration</h3>
    <div class="setting-item">
      <span>Enable Visual Alerts</span>
      <label class="switch">
        <input type="checkbox" id="enable-visuals" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-item">
      <span>Show Area Highlights</span>
      <label class="switch">
        <input type="checkbox" id="show-borders" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-item">
      <span>Show Alert Popovers</span>
      <label class="switch">
        <input type="checkbox" id="show-popovers" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
